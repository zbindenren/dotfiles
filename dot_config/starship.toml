[package]
disabled = false

[status]
symbol = "🔴"
format = '[\[$symbol $common_meaning$signal_name$maybe_int\]]($style) '
map_symbol = true
disabled = false

[directory]
truncate_to_repo = false
truncation_length = 10

[nodejs]
disabled = true

[golang]
disabled = true

[username]
format = "[$user]($style) "

[hostname]
ssh_only = true
format =  "on [$hostname](green) "

[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style) '

[[kubernetes.contexts]]
context_pattern = "(p[1-9]-.*)-admin"
context_alias = "$1"
style = "bold red"
symbol = "🚨 "

[[kubernetes.contexts]]
context_pattern = "(.*)-admin"
context_alias = "$1"
style = "bold red"

[[kubernetes.contexts]]
context_pattern = ".*"
style = "cyan"
