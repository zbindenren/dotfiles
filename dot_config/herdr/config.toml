onboarding = false
[terminal]
default_shell = "fish"

[keys]
prefix = "ctrl+n"

# Detach from session (like tmux prefix+d)
detach = "prefix+d"

# Tab navigation with alt+h/l (like tmux M-h/M-l)
previous_tab = ["prefix+p", "alt+h", "alt+left"]
next_tab = ["prefix+n", "alt+l", "alt+right"]

# Pane navigation (vi-style, like tmux defaults)
focus_pane_left = ["prefix+h"]
focus_pane_down = ["prefix+j"]
focus_pane_up = ["prefix+k"]
focus_pane_right = ["prefix+l"]

# Split panes (like tmux: | for vertical, - for horizontal)
split_vertical = "prefix+|"
split_horizontal = "prefix+minus"

# Reload config (like tmux prefix+r)
reload_config = "prefix+r"

# Last active pane (like tmux prefix+n → last-window)
last_pane = "prefix+tab"

# Custom commands
# Agent navigation — cycle or jump directly to agents in the sidebar
next_agent = "prefix+a"
previous_agent = "prefix+shift+a"
focus_agent = "prefix+alt+1..9"

[[keys.command]]
key = "prefix+shift+s"
type = "popup"
command = "nvim ~/.config/herdr/config.toml"
width = "80%"
height = "80%"

[theme]
name = "catppuccin-latte"
auto_switch = false

[experimental]
pane_history = false

[ui]
copy_on_select = true

[ui.sound]
enabled = false

[ui.toast]
delivery = "herdr"
